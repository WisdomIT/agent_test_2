bot:
  replicaCount: 1
  image:
    repository: chzzk-bot/bot
    tag: latest
    pullPolicy: Always

web:
  replicaCount: 1
  image:
    repository: chzzk-bot/web
    tag: latest
    pullPolicy: Always
  containerPort: 3000
  service:
    port: 3000

postgresql:
  enabled: true
  image: postgres:16-alpine
  database: chzzk
  user: chzzk
  password: changeme
  storage:
    hostPath: /data/postgresql
    size: 5Gi
