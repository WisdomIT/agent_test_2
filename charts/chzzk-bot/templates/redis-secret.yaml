{{- if and .Values.redis.enabled .Values.redis.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chzzk-bot.fullname" . }}-redis
  labels:
    {{- include "chzzk-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  password: {{ .Values.redis.password | b64enc | quote }}
{{- end }}
