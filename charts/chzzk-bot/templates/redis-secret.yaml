{{- if and .Values.redis.enabled (not .Values.redis.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chzzk-bot.fullname" . }}-redis
  labels:
    {{- include "chzzk-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  password: {{ required "redis.password가 필요합니다. existingSecret을 사용하거나 설치 시 --set redis.password=<비밀번호>를 제공하세요." .Values.redis.password | b64enc | quote }}
{{- end }}
