{{- if and .Values.postgresql.enabled (not .Values.postgresql.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chzzk-bot.fullname" . }}-postgresql
  labels:
    {{- include "chzzk-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  password: {{ required "postgresql.password가 필요합니다. existingSecret을 사용하거나 설치 시 --set postgresql.password=<비밀번호>를 제공하세요." .Values.postgresql.password | b64enc | quote }}
{{- end }}
