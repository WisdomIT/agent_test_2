apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chzzk-bot.fullname" . }}-web
  labels:
    {{- include "chzzk-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "chzzk-bot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "chzzk-bot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- if and .Values.web.waitForDependencies (or .Values.postgresql.enabled .Values.redis.enabled) }}
      initContainers:
        {{- if .Values.postgresql.enabled }}
        - name: pg-ready
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "chzzk-bot.fullname" . }}-postgresql -p 5432; do
                echo "PostgreSQL 준비 대기 중...";
                sleep 2;
              done
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: redis-ready
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h {{ include "chzzk-bot.fullname" . }}-redis ping; do
                echo "Redis 준비 대기 중...";
                sleep 2;
              done
        {{- end }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
              protocol: TCP
          {{- if or .Values.postgresql.enabled .Values.redis.enabled }}
          env:
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.user }}:{{ .Values.postgresql.password }}@{{ include "chzzk-bot.fullname" . }}-postgresql:5432/{{ .Values.postgresql.database }}"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ if .Values.redis.password }}:{{ .Values.redis.password }}@{{ end }}{{ include "chzzk-bot.fullname" . }}-redis:6379"
            {{- end }}
          {{- end }}
          resources: {}
